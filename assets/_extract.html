<script>
window.onload = function(){
  var img = document.getElementById('i');
  var canvas = document.getElementById('c');
  var scale = 3;
  var w = Math.floor(img.width * scale);
  var h = Math.floor(img.height * scale);
  canvas.width = w; canvas.height = h;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
  var data = ctx.getImageData(0,0,w,h).data;
  var points = [];
  var step = 5;
  for(var y=0; y<h; y+=step){
    for(var x=0; x<w; x+=step){
      var i = (y*w + x)*4;
      if(data[i+3] > 80){
        points.push({x:x, y:y});
      }
    }
  }
  document.body.setAttribute('data-points', JSON.stringify(points));
  document.body.setAttribute('data-width', w);
  document.body.setAttribute('data-height', h);
};
</script>
